version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: healthcare_etl_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/scripts:/docker-entrypoint-initdb.d
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: healthcare_etl
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: healthcare_etl_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: healthcare_etl_web
    restart: unless-stopped
    volumes:
      - ..:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 120 config.wsgi:application"

  celery_worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.celery
    container_name: healthcare_etl_celery
    restart: unless-stopped
    volumes:
      - ..:/app
    env_file:
      - ../.env
    depends_on:
      - db
      - redis
      - web

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: healthanalytics_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../frontend/.env.local
    depends_on:
      - web
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1

  celery_beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile.celery
    container_name: healthcare_etl_beat
    restart: unless-stopped
    volumes:
      - ..:/app
    env_file:
      - ../.env
    depends_on:
      - db
      - redis
      - web
    command: celery -A config.celery_app beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
