<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine Learning — Healthcare ETL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link href="/static/css/dashboard.css" rel="stylesheet">
</head>
<body>
<div id="toast-container" class="toast-container"></div><div id="sidebar-overlay" class="sidebar-overlay"></div>
{% include 'components/sidebar.html' %}
<div class="main-content">
    <nav class="top-navbar"><div class="left"><button id="sidebar-toggle" class="toggle-btn"><i class="bi bi-list"></i></button><h1 class="page-title">Machine Learning</h1></div><div class="right"><button class="btn-logout" id="btn-logout" title="Cerrar sesi&oacute;n"><i class="bi bi-box-arrow-right"></i></button></div></nav>
    <div class="content-area" data-perm="ml">
        <div class="row g-3 mb-4">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header"><h6><i class="bi bi-bar-chart-steps"></i> Comparaci&oacute;n de Modelos</h6></div>
                    <div class="card-body" id="ml-comparison"><div class="loading-placeholder"><span class="loading-spinner"></span> Cargando modelos...</div></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header"><h6><i class="bi bi-lightning"></i> Acciones</h6></div>
                    <div class="card-body">
                        <button class="btn btn-primary w-100 mb-2" id="btn-train-models" data-perm="ml_train" onclick="trainModels(event)"><i class="bi bi-cpu"></i> Entrenar Modelos</button>
                        <a href="/api/v1/ml/models/comparison/" class="btn btn-outline w-100"><i class="bi bi-box-arrow-up-right"></i> Ver API</a>
                    </div>
                </div>
            </div>
        </div>
        <div class="card" data-perm="ml_predict">
            <div class="card-header"><h6><i class="bi bi-magic"></i> Predicci&oacute;n de Riesgo</h6></div>
            <div class="card-body">
                <form id="predict-form">
                    <div class="row g-3">
                        <div class="col-md-3"><label class="form-label">Edad</label><input type="number" name="age" class="form-control" min="0" max="120" required></div>
                        <div class="col-md-3"><label class="form-label">IMC</label><input type="number" step="0.1" name="bmi" class="form-control" required></div>
                        <div class="col-md-3"><label class="form-label">Glucosa (mg/dL)</label><input type="number" step="0.1" name="glucose" class="form-control" required></div>
                        <div class="col-md-3"><label class="form-label">Colesterol (mg/dL)</label><input type="number" step="0.1" name="cholesterol" class="form-control" required></div>
                        <div class="col-md-3"><label class="form-label">PAS (mmHg)</label><input type="number" name="systolic_bp" class="form-control" required></div>
                        <div class="col-md-3"><label class="form-label">PAD (mmHg)</label><input type="number" name="diastolic_bp" class="form-control" required></div>
                        <div class="col-md-3"><label class="form-label">FC (lpm)</label><input type="number" name="heart_rate" class="form-control" required></div>
                        <div class="col-md-3"><label class="form-label">Tabaquismo</label><select name="smoking" class="form-select"><option value="false">No</option><option value="true">S&iacute;</option></select></div>
                        <div class="col-md-3"><label class="form-label">Ant. Familiares</label><select name="family_history" class="form-select"><option value="false">No</option><option value="true">S&iacute;</option></select></div>
                        <div class="col-md-3"><label class="form-label">Actividad F&iacute;sica</label><select name="physical_activity" class="form-select"><option value="false">No</option><option value="true">S&iacute;</option></select></div>
                        <div class="col-md-3"><label class="form-label">Alcohol</label><select name="alcohol_consumption" class="form-select"><option value="false">No</option><option value="true">S&iacute;</option></select></div>
                        <div class="col-12"><button type="submit" class="btn btn-primary"><i class="bi bi-magic"></i> Predecir Riesgo</button></div>
                    </div>
                </form>
                <div id="prediction-result" class="prediction-result"></div>
            </div>
        </div>
    </div>
</div>
<script src="/static/js/dashboard.js"></script>
<script>
var currentUserRole = null;
function trainModels(event) {
    const btn = event.currentTarget;
    btn.disabled = true; btn.innerHTML = '<span class="loading-spinner"></span> Entrenando...';
    apiRequest('/ml/models/train/', { method: 'POST' }).then(result => {
        if (result?.success) { showToast('Modelos entrenados exitosamente', 'success'); setTimeout(() => location.reload(), 2000); }
        else { showToast(result?.error || 'Error en entrenamiento', 'error'); btn.disabled = false; btn.innerHTML = '<i class="bi bi-cpu"></i> Entrenar Modelos'; }
    });
}
document.addEventListener('DOMContentLoaded', async () => {
    setupSidebar(); setupPredictionForm();
    await checkAuth();
    if (currentUserRole && ROLE_PERMISSIONS[currentUserRole]?.includes('ml')) {
        await loadMLComparison();
    }
});
</script>
</body>
</html>
